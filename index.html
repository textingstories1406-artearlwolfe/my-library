<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium 3D Dynamic Bookshelf</title>
    <style>
        :root {
            --wood-dark: #1e0f06;
            --wood-mid: #351c0e;
            --wood-light: #522c16;
            --shelf-shadow: rgba(0, 0, 0, 0.85);
            --pot-color: #d37c57;
        }

        html, body {
            background-color: transparent !important;
            color-scheme: dark;
            margin: 0;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            box-sizing: border-box;
        }

        .bookcase {
            width: 100%;
            max-width: 800px;
            background: linear-gradient(135deg, #0f0703, #1c0e06);
            border: 18px solid var(--wood-dark);
            border-radius: 8px;
            box-shadow: 0 40px 80px rgba(0,0,0,0.9), inset 0 0 60px rgba(0,0,0,0.95);
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            perspective: 1800px;
        }

        .shelf {
            display: flex;
            align-items: flex-end;
            justify-content: flex-start;
            height: 190px;
            max-height: 190px;
            overflow: hidden;
            gap: 10px;
            padding: 35px 20px 0 20px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.4), rgba(0,0,0,0.1));
            border-bottom: 26px solid var(--wood-mid);
            box-shadow: inset 0 20px 30px rgba(0,0,0,0.85), inset 0 -15px 25px var(--shelf-shadow);
            position: relative;
            box-sizing: border-box;
        }

        .shelf::after {
            content: '';
            position: absolute;
            bottom: -26px;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.08), transparent);
        }

        .shelf-item {
            position: relative;
            cursor: grab;
            transition: transform 0.25s cubic-bezier(0.25, 0.8, 0.25, 1), box-shadow 0.25s ease;
            transform-origin: bottom center;
            flex-shrink: 0;
            user-select: none;
            box-sizing: border-box;
        }
        .shelf-item:active { cursor: grabbing; }
        .shelf-item.dragging { opacity: 0.1; transform: scale(0.95); }

        /* 3D Realism Books */
        .book {
            border-radius: 2px 4px 1px 1px;
            box-shadow: 
                inset -5px 0 7px rgba(0,0,0,0.35), 
                inset 3px 0 4px rgba(255,255,255,0.12), 
                4px 4px 8px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            overflow: hidden; 
            padding: 10px 0;
            background-size: cover;
            background-position: center;
        }

        .book::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; height: 100%;
            background: linear-gradient(90deg, rgba(255,255,255,0.12) 0%, rgba(255,255,255,0) 20%, rgba(0,0,0,0.08) 70%, rgba(0,0,0,0.4) 100%);
            pointer-events: none;
            z-index: 2;
        }

        .book.style-classic::after {
            content: '';
            position: absolute;
            left: 0; right: 0; top: 15%; height: 70%;
            border-top: 2px solid rgba(255,255,255,0.15);
            border-bottom: 2px solid rgba(255,255,255,0.15);
            background: linear-gradient(transparent 85%, rgba(0,0,0,0.2) 100%);
            pointer-events: none;
        }

        .shelf-item:hover:not(.selected) { 
            transform: translateZ(40px) translateY(-6px) rotate(0deg) !important;
            box-shadow: 0 18px 25px rgba(0,0,0,0.65);
            z-index: 5;
        }
        
        .shelf-item.selected {
            transform: translateZ(60px) translateY(-20px) rotate(0deg) !important;
            box-shadow: 0 28px 40px rgba(0,0,0,0.85);
            z-index: 10;
        }

        /* Book Typography */
        .book-info-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transform: rotate(180deg);
            writing-mode: vertical-rl;
            text-orientation: mixed;
            max-height: 80%;
            pointer-events: none;
            gap: 6px;
            z-index: 3;
        }

        .book-title {
            color: #f7f7f7; font-size: 10px; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.9);
        }

        .book-author { color: rgba(255,255,255,0.65); font-size: 7.5px; text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap; text-shadow: 1px 1px 2px rgba(0,0,0,0.8); }
        .progress-strip { width: 3px; height: 22px; background: rgba(0,0,0,0.4); border-radius: 1px; position: relative; overflow: hidden; z-index: 3; box-shadow: inset 0 1px 2px rgba(0,0,0,0.6); }
        .progress-fill { position: absolute; bottom: 0; left: 0; width: 100%; background: #2ecc71; transition: height 0.3s ease; }

        /* REALISTIC DECORATIONS */
        .decor-plant {
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            overflow: visible !important;
        }
        .decor-plant::after {
            content: '';
            width: 80%;
            height: 40%;
            background: linear-gradient(90deg, #be633c, var(--pot-color) 30%, #e29370 70%, #9c4b28);
            border-radius: 2px 2px 6px 6px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.4), inset 0 2px 2px rgba(255,255,255,0.2);
            z-index: 2;
        }
        .decor-plant::before {
            content: '';
            position: absolute;
            bottom: 35%;
            width: 130%;
            height: 75%;
            background: 
                radial-gradient(circle at 50% 20%, #27ae60 20%, transparent 60%),
                radial-gradient(circle at 20% 50%, #1e8449 30%, transparent 70%),
                radial-gradient(circle at 80% 45%, #2ecc71 25%, transparent 65%),
                radial-gradient(circle at 50% 60%, #145a32 40%, transparent 80%);
            border-radius: 50% 50% 40% 40%;
            filter: drop-shadow(0 3px 4px rgba(0,0,0,0.35));
            z-index: 1;
        }

        .decor-frame {
            background: #111;
            border: 4px solid #fff;
            outline: 5px solid #2c1d11;
            box-shadow: 3px 5px 12px rgba(0,0,0,0.6), inset 0 0 10px rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }
        .decor-frame.empty-frame::before {
            content: '📸';
            font-size: 14px;
            opacity: 0.4;
        }

        .add-slot {
            width: 40px;
            height: 120px;
            border: 2px dashed rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            color: rgba(255, 255, 255, 0.15);
            font-size: 20px;
            transition: all 0.2s ease;
            margin-bottom: 2px;
            flex-shrink: 0;
        }
        .add-slot:hover { border-color: var(--wood-light); color: #fff; background: rgba(255,255,255,0.02); transform: translateY(-2px); }

        .editor-modal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #1c1c1e; color: #fff; padding: 24px; border-radius: 14px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.7); z-index: 100; width: 320px;
            box-sizing: border-box; border: 1px solid #3a3a3c;
        }
        .editor-modal.active { display: block; }
        .editor-modal h3 { margin: 0 0 15px 0; font-size: 14px; color: #d6895b; text-transform: uppercase; letter-spacing: 1px; }
        .editor-modal label { display: block; font-size: 11px; color: #aeaeaf; margin: 12px 0 4px 0; font-weight: 600; }
        .editor-modal input[type="text"], .editor-modal input[type="range"], .editor-modal select, .editor-modal input[type="file"] {
            width: 100%; box-sizing: border-box; padding: 8px; background: #2c2c2e; border: 1px solid #3a3a3c; color: white; border-radius: 6px; font-size: 13px;
        }
        .editor-modal input[type="file"] { font-size: 11px; padding: 5px; }

        .modal-buttons { display: flex; gap: 10px; margin-top: 24px; }
        .modal-buttons button { flex: 1; padding: 10px; border-radius: 6px; border: none; cursor: pointer; font-size: 12px; font-weight: bold; }
        .save-btn { background: #d6895b; color: white; }
        .delete-btn { background: #ff453a; color: white; }
        .close-btn { background: #3a3a3c; color: white; }
        
        .creation-menu {
            display: flex; flex-direction: column; gap: 10px; margin-top: 10px;
        }
        .creation-menu button {
            width: 100%; padding: 12px; font-size: 13px; font-weight: 600; border-radius: 6px; border: 1px solid #3a3a3c; background: #2c2c2e; color: white; cursor: pointer; text-align: left; display: flex; align-items: center; gap: 10px;
        }
        .creation-menu button:hover { background: #3d281c; border-color: #d6895b; }
    </style>
</head>
<body>

    <div class="bookcase" id="bookcase"></div>

    <div class="editor-modal" id="editorModal">
        <h3>Edit Shelf Item</h3>
        
        <div id="bookFields">
            <label for="editTitle">Title</label>
            <input type="text" id="editTitle">

            <label for="editAuthor">Author</label>
            <input type="text" id="editAuthor">

            <label for="uploadBookCover">Upload Spine/Cover Design</label>
            <input type="file" id="uploadBookCover" accept="image/*">

            <label for="editProgress">Reading Progress (<span id="progressVal">0</span>%)</label>
            <input type="range" id="editProgress" min="0" max="100" step="5">

            <label for="editStyle">Aesthetic Style</label>
            <select id="editStyle">
                <option value="modern">Modern Minimalist</option>
                <option value="classic">Classic Ribbed</option>
            </select>
        </div>

        <div id="frameFields" style="display: none;">
            <label for="uploadPhoto">Upload Photo From Laptop</label>
            <input type="file" id="uploadPhoto" accept="image/*">
        </div>

        <label for="editWidth">Item Width (<span id="widthVal">35</span>px)</label>
        <input type="range" id="editWidth" min="28" max="100" step="1">
        
        <div class="modal-buttons">
            <button class="delete-btn" onclick="deleteItem()">Delete</button>
            <button class="close-btn" onclick="closeEditor()">Cancel</button>
            <button class="save-btn" onclick="saveItemChanges()">Save</button>
        </div>
    </div>

    <div class="editor-modal" id="creationModal">
        <h3>Add Shelf Decoration</h3>
        <div class="creation-menu">
            <button onclick="addItem('book')">📚 Add Dynamic Book</button>
            <button onclick="addItem('plant')">🌱 Add Ceramic Potted Plant</button>
            <button onclick="addItem('frame')">🖼️ Add Uploadable Photo Frame</button>
        </div>
        <div class="modal-buttons">
            <button class="close-btn" style="width:100%" onclick="document.getElementById('creationModal').classList.remove('active')">Cancel</button>
        </div>
    </div>

    <script>
        const bookcase = document.getElementById('bookcase');
        const modal = document.getElementById('editorModal');
        const creationModal = document.getElementById('creationModal');
        
        const editTitle = document.getElementById('editTitle');
        const editAuthor = document.getElementById('editAuthor');
        const editWidth = document.getElementById('editWidth');
        const widthVal = document.getElementById('widthVal');
        const editProgress = document.getElementById('editProgress');
        const progressVal = document.getElementById('progressVal');
        const editStyle = document.getElementById('editStyle');
        const bookFields = document.getElementById('bookFields');
        const frameFields = document.getElementById('frameFields');
        const uploadPhoto = document.getElementById('uploadPhoto');
        const uploadBookCover = document.getElementById('uploadBookCover');
        
        let libraryData = [];
        let selectedItemId = null;
        let currentUploadedBase64 = null;
        const SHELF_MAX_WIDTH = 730; 

        if (localStorage.getItem('notion_library_3d_dynamic_v3')) {
            libraryData = JSON.parse(localStorage.getItem('notion_library_3d_dynamic_v3'));
        } else {
            libraryData = [
                { id: 'b1', type: 'book', title: 'Design Patterns', author: 'E. Gamma', width: 42, height: 135, bg: '#1abc9c', cover: '', style: 'modern', progress: 65, lean: 0 },
                { id: 'p1', type: 'plant', width: 48, height: 60, lean: 0 },
                { id: 'b2', type: 'book', title: 'Clean Code', author: 'R. Martin', width: 48, height: 140, bg: '#2c3e50', cover: '', style: 'classic', progress: 100, lean: -3 },
                { id: 'f1', type: 'frame', width: 65, height: 80, image: '', lean: 0 }
            ];
        }

        editWidth.oninput = () => widthVal.innerText = editWidth.value;
        editProgress.oninput = () => progressVal.innerText = editProgress.value;

        // Process picture files for both photo frame and book covers
        function setupImageUpload(inputElement) {
            inputElement.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        currentUploadedBase64 = event.target.result;
                    };
                    reader.readAsDataURL(file);
                }
            });
        }
        setupImageUpload(uploadPhoto);
        setupImageUpload(uploadBookCover);

        function saveToLocalStorage() {
            localStorage.setItem('notion_library_3d_dynamic_v3', JSON.stringify(libraryData));
        }

        function renderBookshelf() {
            bookcase.innerHTML = '';
            
            let currentShelf = document.createElement('div');
            currentShelf.className = 'shelf';
            currentShelf.addEventListener('dragover', handleDragOver);
            bookcase.appendChild(currentShelf);

            let currentShelfAccumulatedWidth = 0;

            libraryData.forEach((item) => {
                const itemTotalSpace = item.width + 10; 

                if (currentShelfAccumulatedWidth + itemTotalSpace > SHELF_MAX_WIDTH) {
                    currentShelf = document.createElement('div');
                    currentShelf.className = 'shelf';
                    currentShelf.addEventListener('dragover', handleDragOver);
                    bookcase.appendChild(currentShelf);
                    currentShelfAccumulatedWidth = 0;
                }

                const element = document.createElement('div');
                element.id = item.id;
                element.draggable = true;
                element.addEventListener('dragstart', () => element.classList.add('dragging'));
                element.addEventListener('dragend', () => {
                    element.classList.remove('dragging');
                    rebuildDataSequence();
                });
                element.onclick = (e) => { e.stopPropagation(); openEditor(item.id); };

                element.style.width = `${item.width}px`;
                element.style.height = `${item.height}px`;
                if (item.lean) element.style.transform = `rotate(${item.lean}deg)`;

                if (item.type === 'book') {
                    element.className = `shelf-item book style-${item.style || 'modern'}`;
                    
                    if (item.cover) {
                        element.style.backgroundImage = `url(${item.cover})`;
                        element.style.backgroundColor = 'transparent';
                    } else {
                        element.style.backgroundImage = 'none';
                        element.style.backgroundColor = item.bg;
                    }
                    
                    const infoContainer = document.createElement('div');
                    infoContainer.className = 'book-info-container';
                    
                    const txt = document.createElement('span');
                    txt.className = 'book-title';
                    txt.innerText = item.title;
                    infoContainer.appendChild(txt);

                    if (item.author) {
                        const aut = document.createElement('span');
                        aut.className = 'book-author';
                        aut.innerText = item.author;
                        infoContainer.appendChild(aut);
                    }
                    element.appendChild(infoContainer);

                    const progStrip = document.createElement('div');
                    progStrip.className = 'progress-strip';
                    const progFill = document.createElement('div');
                    progFill.className = 'progress-fill';
                    progFill.style.height = `${item.progress || 0}%`;
                    if(item.progress === 100) progFill.style.backgroundColor = '#f1c40f';
                    progStrip.appendChild(progFill);
                    element.appendChild(progStrip);

                } else if (item.type === 'frame') {
                    element.className = `shelf-item decor-frame`;
                    if (item.image) {
                        element.style.backgroundImage = `url(${item.image})`;
                        element.classList.remove('empty-frame');
                    } else {
                        element.style.backgroundImage = 'none';
                        element.classList.add('empty-frame');
                    }
                } else {
                    element.className = `shelf-item decor-${item.type}`;
                }

                currentShelf.appendChild(element);
                currentShelfAccumulatedWidth += itemTotalSpace;
            });

            if (currentShelfAccumulatedWidth + 50 > SHELF_MAX_WIDTH) {
                currentShelf = document.createElement('div');
                currentShelf.className = 'shelf';
                currentShelf.addEventListener('dragover', handleDragOver);
                bookcase.appendChild(currentShelf);
            }
            
            const addBtn = document.createElement('div');
            addBtn.className = 'add-slot';
            addBtn.innerHTML = '&#43;';
            addBtn.onclick = () => creationModal.classList.add('active');
            currentShelf.appendChild(addBtn);
        }

        function addItem(type) {
            creationModal.classList.remove('active');
            const uniqueId = 'i_' + Date.now();
            let newObj = { id: uniqueId, type: type, lean: 0 };

            if (type === 'book') {
                const colors = ['#923c22', '#2c3e50', '#1e8449', '#2471a3', '#6c3483'];
                newObj.title = `Book ${libraryData.length + 1}`;
                newObj.author = '';
                newObj.width = Math.floor(Math.random() * (46 - 34 + 1)) + 34;
                newObj.height = Math.floor(Math.random() * (150 - 125 + 1)) + 125;
                newObj.bg = colors[Math.floor(Math.random() * colors.length)];
                newObj.cover = '';
                newObj.style = 'modern';
                newObj.progress = 0;
            } else if (type === 'plant') {
                newObj.width = 46; newObj.height = 58;
            } else if (type === 'frame') {
                newObj.width = 60; newObj.height = 75; newObj.image = '';
            }

            libraryData.push(newObj);
            saveToLocalStorage();
            renderBookshelf();
        }

        function openEditor(id) {
            selectedItemId = id;
            currentUploadedBase64 = null;
            uploadPhoto.value = '';
            uploadBookCover.value = '';
            
            const item = libraryData.find(i => i.id === id);
            const domNode = document.getElementById(id);
            if (domNode) domNode.classList.add('selected');

            editWidth.value = item.width;
            widthVal.innerText = item.width;

            if (item.type === 'book') {
                bookFields.style.display = 'block';
                frameFields.style.display = 'none';
                editTitle.value = item.title;
                editAuthor.value = item.author || '';
                editProgress.value = item.progress || 0;
                progressVal.innerText = item.progress || 0;
                editStyle.value = item.style || 'modern';
            } else if (item.type === 'frame') {
                bookFields.style.display = 'none';
                frameFields.style.display = 'block';
            } else {
                bookFields.style.display = 'none';
                frameFields.style.display = 'none';
            }

            modal.classList.add('active');
        }

        function closeEditor() {
            if (selectedItemId) {
                const domNode = document.getElementById(selectedItemId);
                if (domNode) domNode.classList.remove('selected');
            }
            modal.classList.remove('active');
            selectedItemId = null;
        }

        function saveItemChanges() {
            const item = libraryData.find(i => i.id === selectedItemId);
            if (item) {
                item.width = parseInt(editWidth.value);
                if (item.type === 'book') {
                    item.title = editTitle.value;
                    item.author = editAuthor.value;
                    item.progress = parseInt(editProgress.value);
                    item.style = editStyle.value;
                    if (currentUploadedBase64) {
                        item.cover = currentUploadedBase64;
                    }
                } else if (item.type === 'frame' && currentUploadedBase64) {
                    item.image = currentUploadedBase64;
                }
                saveToLocalStorage();
                renderBookshelf();
            }
            closeEditor();
        }

        function deleteItem() {
            libraryData = libraryData.filter(i => i.id !== selectedItemId);
            saveToLocalStorage();
            closeEditor();
            renderBookshelf();
        }

        function handleDragOver(e) {
            e.preventDefault();
            const shelf = e.currentTarget;
            const draggingNode = document.querySelector('.dragging');
            if (!draggingNode) return;

            const afterElement = getDragAfterElement(shelf, e.clientX);
            const addSlot = shelf.querySelector('.add-slot');

            if (afterElement == null) {
                if (addSlot) { shelf.insertBefore(draggingNode, addSlot); } 
                else { shelf.appendChild(draggingNode); }
            } else {
                shelf.insertBefore(draggingNode, afterElement);
            }
        }

        function getDragAfterElement(shelf, x) {
            const draggableElements = [...shelf.querySelectorAll('.shelf-item:not(.dragging)')];
            return draggableElements.reduce((closest, child) => {
                const box = child.getBoundingClientRect();
                const offset = x - box.left - box.width / 2;
                if (offset < 0 && offset > closest.offset) {
                    return { offset: offset, element: child };
                } else {
                    return closest;
                }
            }, { offset: Number.NEGATIVE_INFINITY }).element;
        }

        function rebuildDataSequence() {
            const currentIds = [...bookcase.querySelectorAll('.shelf-item')].map(el => el.id);
            const reorderedData = [];
            currentIds.forEach(id => {
                const dataMatch = libraryData.find(i => i.id === id);
                if (dataMatch) reorderedData.push(dataMatch);
            });
            libraryData = reorderedData;
            saveToLocalStorage();
            renderBookshelf(); 
        }

        renderBookshelf();
    </script>
</body>
</html>
